services:
  - type: web
    name: aetherion-game
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./infra/docker/render.Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aetherion-db
          property: connectionString

databases:
  - name: aetherion-db
    plan: free
    region: singapore
    databaseName: aetherion
    user: aetherion

